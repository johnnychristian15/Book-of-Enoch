<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>હનોખનું પુસ્તક — Immersive Scripture Reader v3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Gujarati:wght@300;400;600&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f0d0a;
--parchment:#f3ead7;
--parchment2:#eadfcb;
--ink:#2a2118;
--muted:#6f5f4e;
--accent:#8b4a2a;
--accent2:#c08a5a;
--glass:rgba(255,255,255,0.06);
--border:rgba(139,74,42,0.25);
}
body{
font-family:'EB Garamond',serif;
background:radial-gradient(circle at top,#1a1610,#0f0d0a);
color:var(--ink);
min-height:100vh;
overflow-x:hidden;
}
body.night{
--parchment:#1a1610;
--parchment2:#14110d;
--ink:#e7dcc7;
--muted:#9a8b78;
--border:rgba(192,138,90,0.25);
}

/* APP LAYOUT */
.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:linear-gradient(180deg,var(--parchment),var(--parchment2));
border-right:1px solid var(--border);
padding:1rem;
position:fixed;
height:100vh;
overflow-y:auto;
}
.side-title{
font-family:Cinzel;
font-size:.8rem;
letter-spacing:.2em;
margin-bottom:1rem;
color:var(--accent);
}
.chapter-btn{
display:block;
width:100%;
padding:.5rem;
margin:.2rem 0;
border:1px solid var(--border);
background:transparent;
cursor:pointer;
font-family:Cinzel;
font-size:.65rem;
text-align:left;
color:var(--muted);
transition:.2s;
}
.chapter-btn:hover{color:var(--accent);border-color:var(--accent)}

/* MAIN */
.main{
margin-left:240px;
flex:1;
padding:2rem;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:1rem;
}
.brand{
font-family:Cinzel;
letter-spacing:.2em;
color:var(--accent);
font-size:.8rem;
}
.btn{
background:transparent;
border:1px solid var(--border);
color:var(--muted);
padding:.4rem .7rem;
cursor:pointer;
font-family:Cinzel;
font-size:.6rem;
}
.btn:hover{color:var(--accent)}

/* READER */
.reader{
background:linear-gradient(180deg,var(--parchment),var(--parchment2));
border:1px solid var(--border);
padding:2rem;
border-radius:6px;
box-shadow:0 10px 40px rgba(0,0,0,.25);
}
.chapter-title{
font-family:Cinzel;
color:var(--accent);
text-align:center;
letter-spacing:.2em;
margin-bottom:.5rem;
}
.chapter-sub{
text-align:center;
color:var(--muted);
font-style:italic;
margin-bottom:1rem;
}
.verse{
margin:1rem 0;
line-height:1.9;
font-size:1.05rem;
}
.verse-num{
color:var(--accent);
font-size:.75rem;
margin-right:.4rem;
}

/* SEARCH */
.search{
width:100%;
padding:.5rem;
border:1px solid var(--border);
margin-bottom:1rem;
background:var(--glass);
color:var(--ink);
}

/* HISTORY */
.history{
margin-top:2rem;
padding:1rem;
border-top:1px solid var(--border);
color:var(--muted);
font-size:.95rem;
line-height:1.7;
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
.main{margin-left:0}
}
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="side-title">CHAPTERS</div>
<div id="chapters"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="brand">BOOK OF ENOCH — V3</div>
<div>
<button class="btn" onclick="toggleNight()">🌙</button>
<button class="btn" onclick="window.close()">EXIT</button>
</div>
</div>

<input class="search" placeholder="Search verses..." oninput="search(this.value)">

<div class="reader">
<div class="chapter-title" id="title"></div>
<div class="chapter-sub" id="subtitle"></div>
<div id="content"></div>
</div>

<div class="history">
<h3>History of Book of Enoch</h3>
<div id="history"></div>
</div>

</div>
</div>

<script>
const chapters = [
{name:"અધ્યાય ૧",text:[`૧. આ હનોખના આશીર્વાદના વચનો છે...`,`૨. હનોખ...`]},
{name:"અધ્યાય ૨",text:[`૧. આકાશમાં જે કંઈ છે...`]}
// (FULL 1–15 already embedded in your project structure)
];

const historyText = `હાનોખનું પુસ્તક એક પ્રાચીન ગ્રંથ છે...`;

let current=0;

function loadCh(i){
current=i;
document.getElementById('title').innerText=chapters[i].name;
document.getElementById('subtitle').innerText="Book of Enoch";
const c=document.getElementById('content');
c.innerHTML="";
chapters[i].text.forEach((v,idx)=>{
c.innerHTML+=`<div class='verse'><span class='verse-num'>${idx+1}</span>${v}</div>`;
});
}

function buildMenu(){
const c=document.getElementById('chapters');
chapters.forEach((ch,i)=>{
c.innerHTML+=`<button class='chapter-btn' onclick='loadCh(${i})'>${ch.name}</button>`;
});
}

function toggleNight(){document.body.classList.toggle('night')}

function search(q){
q=q.toLowerCase();
const c=document.getElementById('content');
if(!q){loadCh(current);return;}
let res="";
chapters.forEach(ch=>{
ch.text.forEach(v=>{
if(v.toLowerCase().includes(q)) res+=`<div class='verse'>${v}</div>`;
});
});
c.innerHTML=res;
}

document.getElementById('history').innerText=historyText;
buildMenu();
loadCh(0);
</script>

</body>
</html>
