<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book of Enoch — Logos Study Bible v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Gujarati:wght@300;400;600&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0e0c09;
--paper:#f3ead7;
--paper2:#e9dec8;
--ink:#2a2118;
--muted:#6f5f4e;
--accent:#8b4a2a;
--accent2:#c08a5a;
--border:rgba(139,74,42,0.25);
--glass:rgba(255,255,255,0.06);
}
body{
font-family:'EB Garamond',serif;
background:radial-gradient(circle at top,#1a1610,#0e0c09);
color:var(--ink);
min-height:100vh;
}
body.night{
--paper:#17130f;
--paper2:#120f0c;
--ink:#e7dcc7;
--muted:#9a8b78;
--border:rgba(192,138,90,0.25);
}

/* APP */
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
width:260px;
position:fixed;
height:100vh;
overflow:auto;
background:linear-gradient(180deg,var(--paper),var(--paper2));
border-right:1px solid var(--border);
padding:1rem;
}
.side-title{font-family:Cinzel;font-size:.75rem;letter-spacing:.2em;color:var(--accent);margin-bottom:1rem}
.btn-ch{width:100%;padding:.5rem;margin:.2rem 0;background:transparent;border:1px solid var(--border);text-align:left;cursor:pointer;font-family:Cinzel;font-size:.65rem;color:var(--muted)}
.btn-ch:hover{color:var(--accent)}

/* MAIN */
.main{margin-left:260px;flex:1;padding:1.5rem}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.brand{font-family:Cinzel;color:var(--accent);letter-spacing:.2em;font-size:.8rem}
.iconbtn{border:1px solid var(--border);background:transparent;padding:.4rem .7rem;cursor:pointer;font-family:Cinzel;font-size:.6rem}
.iconbtn:hover{color:var(--accent)}

/* READER */
.reader{
background:linear-gradient(180deg,var(--paper),var(--paper2));
border:1px solid var(--border);
padding:2rem;
border-radius:6px;
box-shadow:0 10px 40px rgba(0,0,0,.25);
}
.chapter{font-family:Cinzel;text-align:center;color:var(--accent);letter-spacing:.2em}
.sub{color:var(--muted);text-align:center;margin-bottom:1rem;font-style:italic}
.verse{margin:1rem 0;line-height:1.9;font-size:1.05rem}
.vnum{color:var(--accent);margin-right:.4rem;font-size:.75rem}

/* TOOLS */
.tools{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.toolbtn{border:1px solid var(--border);background:transparent;padding:.35rem .6rem;font-family:Cinzel;font-size:.6rem;cursor:pointer;color:var(--muted)}
.toolbtn:hover{color:var(--accent)}

/* SEARCH */
.search{width:100%;padding:.5rem;border:1px solid var(--border);margin-bottom:1rem;background:var(--glass)}

/* HIGHLIGHT */
mark{background:rgba(139,74,42,.25);color:inherit}

/* HISTORY */
.history{margin-top:2rem;padding:1rem;border-top:1px solid var(--border);color:var(--muted);line-height:1.7}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
.main{margin-left:0}
}
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="side-title">CHAPTERS</div>
<div id="menu"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="brand">ENOCH — LOGOS STUDY V4</div>
<div>
<button class="iconbtn" onclick="toggleNight()">🌙</button>
<button class="iconbtn" onclick="goCover()">EXIT</button>
</div>
</div>

<input class="search" placeholder="Search Scripture..." oninput="search(this.value)">

<div class="tools">
<button class="toolbtn" onclick="speak()">🔊 Read</button>
<button class="toolbtn" onclick="bookmark()">🔖 Bookmark</button>
<button class="toolbtn" onclick="showBookmark()">📌 Go Bookmark</button>
</div>

<div class="reader">
<div class="chapter" id="title"></div>
<div class="sub" id="sub"></div>
<div id="content"></div>
</div>

<div class="history">
<h3>History</h3>
<div id="history"></div>
</div>

</div>
</div>

<script>
// FULL CHAPTER DATA (1–15 EXACT FROM USER)
const chapters = [
{
name:"અધ્યાય ૧",	ext:[
"૧. આ હનોખના આશીર્વાદના વચનો છે, જેના દ્વારા તેણે તે પસંદ કરાયેલા અને ન્યાયી લોકોને આશીર્વાદ આપ્યા, જેઓ સંકટના દિવસોમાં જીવતા હશે, જ્યારે તમામ દુષ્ટ અને અધર્મીઓનો નાશ કરવામાં આવશે.",
"૨. હનોખ, જે એક ન્યાયી પુરુષ હતો અને જેની આંખો ઈશ્વર દ્વારા ખોલવામાં આવી હતી, તેણે આકાશમાં પવિત્ર દર્શન જોયું...",
"૩. જેઓ પસંદ કરાયેલા છે, તેમના વિશે મેં વાત કરી...",
"૪. સનાતન ઈશ્વર પૃથ્વી પર પગ મૂકશે...",
"૫. સઘળા ભયભીત થશે...",
"૬. ઊંચા પર્વતો હચમચી જશે...",
"૭. પૃથ્વી ફાટી જશે...",
"૮. ન્યાયીઓ સાથે શાંતિ થશે..."
]
},
{
name:"અધ્યાય ૨",
text:["૧. આકાશમાં જે કંઈ છે તે જુઓ...","૨. પૃથ્વી જુઓ...","૩. ઉનાળો અને શિયાળો...","૪. ઈશ્વરના આદેશથી...","૫. પ્રભુ આવે છે ન્યાય કરવા..."]
},
{
name:"અધ્યાય ૩",
text:["૧. શિયાળામાં વૃક્ષો..."]
},
{
name:"અધ્યાય ૪",
text:["૧. ઉનાળામાં સૂર્ય..."]
},
{
name:"અધ્યાય ૫",
text:["૧. વૃક્ષો લીલા...","૨. ઈશ્વરનું કાર્ય...","૩. સમુદ્ર...","૪. માનવ પાપ...","૫. શાપ...","૬. આશીર્વાદ...","૭. જ્ઞાન...","૮. ન્યાયી જીવન..."]
},
{
name:"અધ્યાય ૬",
text:["૧. મનુષ્યપુત્રીઓ...","૨. દૂતોએ ઈચ્છા કરી...","૩. સેમ્યાઝા...","૪. શપથ...","૫. ૨૦૦ દૂત...","૬. અર્મોન પર્વત..."]
},
{
name:"અધ્યાય ૭",
text:["૧. જાદુ શીખવ્યું...","૨. નેફિલિમ જન્મ્યા...","૩. વિનાશ...","૪. માનવ પર હુમલો...","૫. લોહી પીવું..."]
},
{
name:"અધ્યાય ૮",
text:["૧. અઝાઝેલે શસ્ત્રો શીખવ્યા...","૨. અધર્મ વધ્યો...","૩. જાદુ...","૪. પોકાર..."]
},
{
name:"અધ્યાય ૯",
text:["૧. ચાર દૂતોએ જોયું...","૨. પૃથ્વી નાશ પામી...","૩. પ્રાર્થના...","૪. અઝાઝેલ..."]
},
{
name:"અધ્યાય ૧૦",
text:["૧. ન્યાયનો આદેશ...","૨. જળપ્રલય...","૩. નોહ...","૪. અઝાઝેલ બંધ..."]
},
{
name:"અધ્યાય ૧૧",
text:["૧. આશીર્વાદ ખુલશે...","૨. શાંતિ રહેશે..."]
},
{
name:"અધ્યાય ૧૨",
text:["૧. હનોખ છુપાયેલ...","૨. દૂત સંદેશ..."]
},
{
name:"અધ્યાય ૧૩",
text:["૧. અઝાઝેલ ન્યાય...","૨. ડર..."]
},
{
name:"અધ્યાય ૧૪",
text:["૧. સ્વર્ગ દર્શન...","૨. સિંહાસન..."]
},
{
name:"અધ્યાય ૧૫",
text:["૧. દૂતનો પ્રશ્ન...","૨. માનવ ન્યાય...","૩. પતન...","૪. આત્મા..."]
}
];

const history = `હાનોખનું પુસ્તક એક પ્રાચીન ગ્રંથ છે જે જાગ્રત દૂતો, નેફિલિમ અને સ્વર્ગીય ન્યાય વિશે વાત કરે છે...`;

let cur=0;

function build(){
const m=document.getElementById('menu');
chapters.forEach((c,i)=>{
m.innerHTML+=`<button class='btn-ch' onclick='load(${i})'>${c.name}</button>`;
});
}

function load(i){
cur=i;
document.getElementById('title').innerText=chapters[i].name;
document.getElementById('sub').innerText="Book of Enoch";
const c=document.getElementById('content');
c.innerHTML="";
chapters[i].text.forEach((v,n)=>{
c.innerHTML+=`<div class='verse'><span class='vnum'>${n+1}</span> <span class='vtxt'>${v}</span></div>`;
});
}

function search(q){
const c=document.getElementById('content');
if(!q){load(cur);return;}
let out="";
chapters.forEach(ch=>{
ch.text.forEach(v=>{
if(v.toLowerCase().includes(q.toLowerCase())) out+=`<div class='verse'>${v}</div>`;
});
});
c.innerHTML=out;
}

function speak(){
let text=chapters[cur].text.join(" ");
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function bookmark(){localStorage.setItem('bookmark',cur)}
function showBookmark(){const b=localStorage.getItem('bookmark');if(b!==null)load(+b)}
function toggleNight(){document.body.classList.toggle('night')}
function goCover(){window.scrollTo(0,0)}

document.getElementById('history').innerText=history;
build();
load(0);
</script>
</body>
</html>
