<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>હનોખનું પુસ્તક</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Gujarati:wght@300;400;600&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0e6d0;
  --card:#e8dcc4;
  --ink:#2c2218;
  --muted:#7a6a58;
  --accent:#8b4a2a;
  --border:rgba(0,0,0,0.15);
}

body{
  font-family:'EB Garamond',serif;
  background:var(--bg);
  color:var(--ink);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(240,230,208,0.95);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:center;
  gap:20px;
  padding:12px;
  z-index:1000;
}

nav button{
  background:none;
  border:none;
  font-family:'Cinzel',serif;
  cursor:pointer;
  font-size:12px;
  letter-spacing:2px;
  color:var(--muted);
}
nav button:hover{color:var(--accent)}

/* PAGES */
.page{
  display:none;
  min-height:100vh;
  padding:80px 20px 40px;
}

.page.active{display:block}

/* COVER */
.cover{
  text-align:center;
  max-width:700px;
  margin:auto;
  padding:40px;
  border:1px solid var(--border);
  background:var(--card);
}

.cover h1{
  font-size:34px;
  margin-bottom:10px;
}

.cover h2{
  font-family:'Noto Serif Gujarati';
  font-size:28px;
  margin-bottom:20px;
}

.btn{
  padding:10px 20px;
  border:1px solid var(--accent);
  background:transparent;
  cursor:pointer;
  margin-top:20px;
}

/* MENU */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}

.card{
  padding:10px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  text-align:center;
}

/* READER */
.reader{
  max-width:800px;
  margin:auto;
  background:white;
  padding:30px;
  border:1px solid var(--border);
}

.chapter-title{
  text-align:center;
  margin-bottom:20px;
}

.verse{
  margin-bottom:15px;
  line-height:1.8;
}

/* HISTORY */
.history{
  max-width:800px;
  margin:auto;
  background:white;
  padding:30px;
  border:1px solid var(--border);
  line-height:1.9;
}

.exit{
  position:fixed;
  right:20px;
  bottom:20px;
  padding:10px 14px;
  border:1px solid red;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <button onclick="show('cover')">Home</button>
  <button onclick="show('menu')">Chapters</button>
  <button onclick="show('history')">History</button>
</nav>

<!-- COVER -->
<div id="cover" class="page active">
  <div class="cover">
    <h1>The Book of Enoch</h1>
    <h2>હનોખનું પુસ્તક</h2>
    <p>જાગ્રત દૂતોનું પુસ્તક</p>
    <button class="btn" onclick="show('menu')">Enter</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="page">
  <div class="grid" id="grid"></div>
</div>

<!-- READER -->
<div id="reader" class="page">
  <div class="reader">
    <h2 class="chapter-title" id="ct"></h2>
    <div id="content"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="page">
  <div class="history">
    <h2>હનોખનું પુસ્તક — ઇતિહાસ</h2>
    <p>
      હાનોખનું પુસ્તક પ્રાચીન યહૂદી અને પ્રારંભિક ખ્રિસ્તી પરંપરાઓમાં ખૂબ મહત્વ ધરાવે છે...
      (👉 અહીં તમારો સંપૂર્ણ history text paste કરો — હું આગળ clean format પણ બનાવી શકું)
    </p>
  </div>
</div>

<!-- EXIT -->
<button class="exit" onclick="exitApp()">Exit</button>

<script>

const chapters = [
  {t:"અધ્યાય ૧", v:["૧. આ હનોખના આશીર્વાદના વચનો છે...","૨. હનોખ એક ન્યાયી પુરુષ હતો..."]},
  {t:"અધ્યાય ૨", v:["૧. આકાશમાં જે કંઈ છે તે જુઓ...","૨. પૃથ્વીને જુઓ..."]},
  // 👉 you can continue full chapters here (I can also inject all 15 fully formatted)
];

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildMenu(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  chapters.forEach((c,i)=>{
    let d=document.createElement('div');
    d.className='card';
    d.innerText=c.t;
    d.onclick=()=>openChapter(i);
    g.appendChild(d);
  });
}

function openChapter(i){
  show('reader');
  document.getElementById('ct').innerText=chapters[i].t;
  document.getElementById('content').innerHTML=
    chapters[i].v.map(v=>`<div class="verse">${v}</div>`).join('');
}

function exitApp(){
  show('cover');
}

buildMenu();
</script>

</body>
</html>
